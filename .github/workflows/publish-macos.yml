name: Publish Smalltalk for macOS

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build ${{ matrix.arch }} release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: Apple Silicon
            target: aarch64-apple-darwin
          - arch: Intel
            target: x86_64-apple-darwin
    runs-on: macos-14
    env:
      APPLE_SIGNING_IDENTITY: "-"
      SMALLTALK_VERIFIED_MACOS_BUILD: "1"
      SMALLTALK_UNSIGNED_ALPHA_BUILD: "1"
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Require the tagged commit to be on main
        shell: bash
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit already merged into main." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version
        run: npm run release:check-version -- "${{ github.ref_name }}"

      - name: Verify release secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "The TAURI_SIGNING_PRIVATE_KEY repository secret is missing." >&2
            exit 1
          fi

      - name: Test webview behavior
        run: npm run test:webview

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Smalltalk ${{ github.ref_name }}
          releaseBody: |
            This release contains the latest Smalltalk macOS app and its verified in-app update artifacts.

            This technical alpha is ad-hoc signed and is not Apple-notarized.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: >-
            --target ${{ matrix.target }}
            --bundles app,dmg
            --config '{"bundle":{"macOS":{"signingIdentity":"-"}}}'
